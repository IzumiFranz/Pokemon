<!Doctype html>
<html lang =en>
    <head>
        <style>
            body{
                margin:0;
                font-family:Arial, sans-serif;
                background:#f5f5f5;
            }
            header{
                background: linear-gradient(to right, #ffde00, #ff0000);
                padding: 30px;
                text-align: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            }
            .pokemon-title{
                font-size:30px;
                font-weight:bold;
                color:#ffde00;
                -webkit-text-stroke: 3px #2a75bb;
                text-shadow: 4px 4px 0 #2a75bb, 6px 6px 10px rgba(0, 0, 0, 0.3);
                letter-spacing: 3px;
            }
            main{
                padding:20px;
  
            }
            .container{
            display: flex;
            }
            .card{
                text-align: center;
            }
        </style>
        <title>Pokemon</title>
    </head>
    <body>
        <header>
            <h1 class="pokemon-title">Pokemon</h1>
        </header>
        <main>
            <a href ="#Gen1">Gen 1</a> |
            <a href ="#Gen2">Gen 2</a> |
            <a href ="#Gen3">Gen 3</a>
            <h2 id="Gen1"> Gen 1 Pokemon Starters</h2>
            <div class="container">
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" alt="Bulbasaur">
            <p>Bulbasaur</p>
            </div>
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" alt="Charmander">
            <p>Charmander</p>
            </div>
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" alt="Squirtle">
            <p>Squirtle</p>
            </div>
            </div>
            <h2 id="Gen2"> Gen 2 Pokemon Starters</h2>
            <div class="container">
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/152.png" alt="Chikorita">
            <p>Chikorita</p>
            </div>
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/155.png" alt="Cyndaquil">
            <p>Cyndaquil</p>
            </div>
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/158.png" alt="Totodile">
            <p>Totodile</p>
            </div>
            </div>
            <h2 id="Gen3"> Gen 3 Pokemon Starters</h2>
            <div class="container">
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/252.png" alt="Treecko">
            <p>Treecko</p>
            </div>
            <div class="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/255.png" alt="Torchic">
            <p>Torchic</p>
            </div>
            <div class ="card">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/258.png" alt="Mudkip">
            <p>Mudkip</p>
            </div>
            </div>
            <p>For more information about these Pokemon, please visit the <a href="https://pokemon.fandom.com/wiki/Pokémon" target="_blank">Pokémon Wiki</a>.</p>
        </main>
        <footer>
            <p style="text-align:center; padding:20px; background:#2a75bb; color:#fff;">&copy; 2026 Pokemon Inc.</p>
        </footer>
    </body>
</html>
